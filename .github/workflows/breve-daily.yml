name: Brève — revue quotidienne

# Quand ce traitement se déclenche
on:
  schedule:
    # Tous les jours à 04:00 UTC = 06:00 heure de Paris (été, UTC+2).
    # NB : les crons GitHub sont peu fiables (souvent retardés ou sautés).
    # Le déclenchement réel se fait via un planificateur externe (cron-job.org)
    # qui appelle le déclencheur "repository_dispatch" ci-dessous. Ce cron reste
    # en filet de secours au cas où GitHub l'honorerait.
    - cron: "0 4 * * *"
  # Déclenchement par appel extérieur (planificateur cron-job.org) : c'est le
  # mécanisme fiable qui lance vraiment la revue chaque matin.
  repository_dispatch:
    types: [revue-quotidienne]
  # Permet aussi de lancer manuellement depuis l'onglet Actions de GitHub.
  workflow_dispatch:

# Autorise le workflow à réécrire le fichier de données dans le dépôt
permissions:
  contents: write

jobs:
  generer-la-revue:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère votre code
      - name: Récupérer le code
        uses: actions/checkout@v4

      # 2. Installe Python
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Installe les dépendances
      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # 4. Génère la revue du jour
      #    La clé API est lue depuis les "secrets" du dépôt (jamais en clair).
      - name: Générer les brèves
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_daily.py --limit 50 --out ./public

      # 5. Publie le résultat : si breves.json a changé, on l'enregistre
      #    dans le dépôt. L'app pourra alors lire la revue à jour.
      - name: Publier la revue
        run: |
          git config user.name "Brève Bot"
          git config user.email "actions@users.noreply.github.com"

          # Les fichiers de données (breves.json / breves.js) sont ENTIÈREMENT
          # régénérés à chaque exécution : l'ancienne version n'a aucune valeur.
          # On met donc en place une stratégie sans conflit possible :
          #   1. on sauvegarde la version fraîche qu'on vient de produire ;
          #   2. on se resynchronise sur la dernière version du dépôt ;
          #   3. on réécrit les fichiers avec la version fraîche ;
          #   4. on publie.
          # Ainsi, quoi qu'il se soit passé entre-temps, la revue du jour gagne.

          mkdir -p /tmp/breve-out
          cp public/breves.json /tmp/breve-out/ 2>/dev/null || true
          cp public/breves.js   /tmp/breve-out/ 2>/dev/null || true

          # Se recale proprement sur la dernière version distante de main.
          git fetch origin main
          git reset --hard origin/main

          # Replace la version fraîche par-dessus la version distante à jour.
          cp /tmp/breve-out/breves.json public/breves.json 2>/dev/null || true
          cp /tmp/breve-out/breves.js   public/breves.js   2>/dev/null || true

          git add public/breves.json public/breves.js
          if git diff --staged --quiet; then
            echo "Aucun changement, rien à publier."
          else
            git commit -m "Revue du jour $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi

      # 6. Prévient les abonnés que la revue du jour est prête (via OneSignal).
      #    La clé est un secret du dépôt ; si elle est absente, l'étape ne fait
      #    rien et ne casse pas le workflow.
      - name: Notifier les abonnés
        env:
          ONESIGNAL_API_KEY: ""
          ONESIGNAL_APP_ID: c26253c9-7282-4fca-9dbf-53183c86796d
        run: python notify_onesignal.py
